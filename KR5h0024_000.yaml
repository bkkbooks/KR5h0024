body:
  text: 太微帝君二十四神回元經漆四太微帝君太一造形紫元內神二十四真人混氣變生主仙上精散解胞結釋滯關元二十四神所命乃得除脫也兆能修存名字者則治鎮一身保守元精欲解節結之法當先祝之乃得開關耳此靈並是結氣之玄宗成體之真神運道雲霧帶生煙煴能致玉輦龍騎千萬列行同與一體白日登天此太上真人二十四神存玄元帝君上清乘飈欻之道也常當安身靜心正氣夷行閉目內視忘體念神燒香盥練存神守真髣佛三入藹暉玄英行之十八年太上命太微帝君太一五神化生混靈道君從二十四真人千乘萬騎騁風攝云呼吸流升白日造天存神之道勿交非類深室避事栖精躡空心存目想微妙守沖靜魂安形則萬害不傷百鬼避竄千妖不行消災散禍福慶不可勝紀先叩齒二十四通畢乃存思腦神明覺元子字道都形長一寸一分色正白髮神名玄文華字道衡形長二寸二分色色玄皮膚神名通衆仲字道連形長一寸五分色黃目神名虛監生字道童形長三寸六分衣五色項髓神名靈謨蓋字道周形長五寸色白素衣膂神名益歷輔字道柱形長三寸半白玉素衣鼻神名沖龍玉字道微形長二寸五分青白黃色衣舌神名始梁峙字道岐形長七寸正赤色右一身上部八景神童名字先存之並如嬰兒之形髣佛在身各安其所訖乃叩齒八通咽液八過而微祝曰上景八神一合入身帝君玄母五神各陳舉形遁化流變適真千乘萬騎俱升帝宸白元無英道養太賔八靈翼體玉華銜煙恍惚十周徑造日門初存思之始先三呼神名字祝訖又三呼神名字令聲則出口三部同爾平旦日中夜半三時恆存二十四神以次念之祝呼如上法高上寶神明科經説曰叩齒之法左左相叩名曰扣天鐘右右相叩名曰捶天磐中央上下相對相叩名曰鳴天鼓若卒遇凶惡不祥當叩天鐘三十過若經山辟邪威神大祝當捶天磬若存思念道致真招靈當鳴天鼓叩齒雖一其實有左右上下也故凶惡而畏天鐘之響山神而懾天磬之動招神而肅天鼓之震矣玄青有節希微內感不可以一槩而求不可以偶然而合也千章萬事皆當如此叩齒之道演矣鍾鼓之音别矣是以道數不可乖錯法術不可雜亂乖錯則有暗昧之敗雜亂則有囂毁之禍非冥冥之無貫也行冥貫之無序則道之不可成事之不可驗良由求真之途不得也履迹踧之造而名愆于世俗矣扣天鍾三十過謂無他祝孤行此以除不祥耳若有所案行隨本法叩齒之多少不必須扣三十過也喉神名百流放字道通形長八寸八分九色衣肺神名素靈生字道平形長八寸一分純白心神名焕陽昌字道明形長九寸色赤肝神名開君童子道青形長六寸色青黃膽神名龍德拘字道放形長二寸六分色青黃緑左腎神名春元真字道卿形長三寸七分數變白赤青五色無常右腎神名象地無字道生形長三寸五分色白或黑脾神名寶元全字道騫形長七寸三分色正黃右一身中部八景神童名字次存之並如嬰兒之形髣佛在身各安其所訖叩齒八通咽液八過而為咒曰中景八神四變九飛練魂正身明景同暉帝君解結胎練四歸上通玄母散靈步威得與八神合輦齊扉千乘萬騎上登太微胃神名同來育字道展形長七寸色黃窮腸中神名兆滕康字道還形長二寸四分黃赤色大小腸中神名蓬送留字道厨形長二寸一分色赤黃胴中神名受厚勃字道虛形長九寸一分九色衣胸膈神名廣瑛宅字道仲形長五寸色白兩脅神名辟瑕馬字道成形長四寸一分赤白色左陰左陽神名扶流起字道圭形長二寸三分青黃白色在男存為左陽在女存為左陰右陰右陽神名苞表明字道生形長二寸三分青黃白色在男存為右陽在女存為右陰右一身下部八景神童名字後存之並如嬰兒之形髣佛在身各安其所訖乃叩齒八通咽液八過而微祝曰下景八神散形九靈紫煙鬱生含元守精太一元父帝君挺生七爽免籍司命記生魂𩲸以安五華育明千乘萬騎與我同並先造太素北揖上清道一內神名逮無馬字道極生形長一寸二分紫色男存曰道一內神女存曰真元中靈右一神極根之幽神守中之上靈也次有存之如嬰兒之狀安坐其所訖乃叩齒二十四通咽液二十四過而微咒曰玄上內真養形侍晨總紐攝綱九度八旋斗星內朗宫館九陳帝君合昌九道七咽出液內精和灌衆神五藏生華反老童顏千乘萬騎與我升天上朝太陛高揖玉晨右一身寶名內字化生之精神也不知此名則仙道不成矣若解結之日不先祝此者則結節不解也結節不解必三魂失適上元內喪五老失明帝君乖踈也男存為童子之神女存為女子之神俱同一名字也存二十四神當以夜半去枕平臥握固放體氣調而微存思其身神安念帝君令髣佛居位閉目內視之如有不具便當燒香平坐閉目握固兩膝上精存衆神祝行如法其平旦日中時存神自平坐而行之勿令有見之者矣皆內視臨閉目而存也月一日夜半存神訖又存兩目中有白氣如雞子大在面目前須臾變成兩明鏡徑九寸以前後照我一體上二十四神使洞鑒分明良久乃心祝曰大明寶鏡分形散花鑒朗元神制却萬魔飛行上清披雲巾羅役使千靈封山召河畢五日一行之所謂覆校內精檢五神者也常能行之災害不生而位登高仙拂童之道使徹見帝君五神之法常以甲子之旬庚午日日中時取清水一升以一銖真丹投水中攪之左行三五過祝曰玄流朱精生光入明身神衆列並來見行徹視萬里中達九靈帝君映童使我上清祝畢東向以洗目二七過恆行之者徹視萬神祝當微言以水向月建洗目不常東向也太微帝君二十四神回元經終
